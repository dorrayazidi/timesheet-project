apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-dep
  namespace: chap4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:latest
        env:
          - name: MYSQL_ROOT_PASSWORD
            value: "pass"           # ← ton mot de passe root MySQL
          - name: MYSQL_DATABASE
            value: "timesheetdb"    # ← la base que tu veux créer
        ports:
          - containerPort: 3306
        volumeMounts:
          - name: mysql-pvc
            mountPath: /var/lib/mysql
      volumes:
        - name: mysql-pvc
          persistentVolumeClaim:
            claimName: mysql-pvc

